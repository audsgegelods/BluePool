{% extends 'base.html' %}

{% block content %}
<h2> Available Rides </h2>
{% for ride in ride_list %}
<ul>
    <li><h2 style="font-size: 18;">Ride {{ride.pk}}</h2>
        <p style="font-size: 10;"><i>posted by [name]</i></p>
        <p style="font-size: 14;">Pick-up point: {{ride.pick_up_location}}</p>
        <a style="font-size: 14;" href="{{ ride.get_absolute_url }}">View Ride Details</a>
    </li>
</ul>
{% endfor %}
{% endblock %}
