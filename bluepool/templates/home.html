{% extends 'base.html' %}

{% block content %}

    {% if not user.is_authenticated %}
        <a href="{% url 'login' %}">Log in</a>
    {% else %}
        <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <input type="submit" value="Logout">
        </form>
    {% endif %}
        <a href="{% url 'user_management:profile_create' %}">Register Here</a>
{% endblock %}
