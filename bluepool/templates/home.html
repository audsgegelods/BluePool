{% extends 'base.html' %}

{% block content %}

    <div class="container text-center pt-5">
        <div class="row justify-content-center">
            <h1 style="color:#E3F4F1">BluePool</h1>
        </div>
        <div class="row justify-content-center">
            <div class="card bg-dark" style="width: 18rem;">
                <div class="col">
                    {% if not user.is_authenticated %}
                        <a href="{% url 'login' %}" class="btn btn-primary">Log in</a>
                        <a href="{% url 'user_management:profile_create' %}" class="btn btn-primary">Register Here</a>
                    {% else %}
                        <p style="color:white;">Logged in as {{ user }}</p>
                        <a href="{% url 'rideposting:ride_list' %}" class="btn btn-primary"> Find a Ride </a>
                        <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <input type="submit" value="Logout">
                        </form>
                    {% endif %}
                            
                </div>
            </div>
        </div>
    </div>
{% endblock %}
