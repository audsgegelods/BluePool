{% extends 'base.html' %}

{% block title %}Create Ride{% endblock %}
{% block content %}
        <h1>Create a New Ride:</h1>
        <p>Please input time as m/d/y h:m</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create New Ride</button>
        </form>
{% endblock %}
